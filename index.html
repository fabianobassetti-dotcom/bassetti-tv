<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player TV</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <header class="app-header">
        <div class="logo-container">
            <span class="logo-text">PLAYER <span class="logo-highlight">TV</span></span>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 Pesquisar canais por nome...">
        </div>
    </header>

    <main class="app-container">
        <aside class="sidebar">
            <div class="filter-tabs">
                <button id="btn-todos" class="tab-btn active">Todos</button>
                <button id="btn-favoritos" class="tab-btn">⭐ Favoritos</button>
                <button id="btn-historico" class="tab-btn">🕒 Histórico</button>
            </div>
            
            <div class="category-selector-container">
                <select id="category-select" class="category-select">
                    <option value="TODOS">Todas as Categorias</option>
                </select>
            </div>

            <div id="channels-list" class="channels-list">
                <div class="loading-message">Carregando lista de canais...</div>
            </div>
        </aside>

        <section class="player-container">
            <div class="video-wrapper">
                <video id="video-player" controls autoplay playsinline></video>
                <div id="player-placeholder" class="player-placeholder">
                    <div class="placeholder-content">
                        <h2>Nenhum canal selecionado</h2>
                        <p>Escolha um canal na lista lateral para iniciar a transmissão.</p>
                    </div>
                </div>
            </div>
            <div class="player-footer">
                <div class="now-playing">
                    <img id="current-logo" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="" class="current-logo hidden">
                    <div>
                        <h3 id="current-title">Selecione um canal</h3>
                        <p id="current-group">-</p>
                    </div>
                </div>
                <div class="player-actions">
                    <button id="btn-toggle-favorite" class="action-btn hidden" title="Favoritar Canal">⭐ Favoritar</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="status-bar">
        <span id="status-text">Iniciando sistema Player TV...</span>
    </footer>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
